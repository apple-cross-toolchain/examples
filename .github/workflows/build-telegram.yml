name: build-telegram

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build_telegram:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: examples

      - name: Clone Telegram-iOS
        run: |
          git clone --depth 1 --recursive --shallow-submodules \
            -b rules_applecross \
            https://github.com/apple-cross-toolchain/Telegram-iOS.git

      - name: Prepare build environment
        run: |
          sudo apt-get update && sudo apt-get install -y gperf

          cat > ~/.netrc <<EOF
          machine api.github.com
          login ${{ secrets.SDKS_USER }}
          password ${{ secrets.SDKS_PASSWORD }}
          EOF
          chmod 600 ~/.netrc

          cd Telegram-iOS
          sed -i 's|SDKS_URL|${{ secrets.SDKS_URL }}|g' MODULE.bazel

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Build Telegram
        run: |
          cd Telegram-iOS
          bazel --host_jvm_args=-Xmx12g --host_jvm_args=-Xms12g build //Telegram:Telegram \
            --remote_cache=${{ secrets.BAZEL_REMOTE_CACHE }} \
            --google_default_credentials \
            --remote_upload_local_results=true \
            --remote_download_toplevel \
            --jobs=3

      - uses: actions/upload-artifact@v4
        with:
          name: Telegram.ipa
          path: Telegram-iOS/bazel-bin/Telegram/Telegram.ipa

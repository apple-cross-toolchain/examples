name: build-telegram

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build_telegram:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          path: examples

      - name: Clone Telegram-iOS
        run: |
          git clone --depth 1 --recursive --shallow-submodules \
            -b rules_applecross \
            https://github.com/apple-cross-toolchain/Telegram-iOS.git

      - name: Prepare build environment
        run: |
          sudo apt-get update && sudo apt-get install -y gperf

          cat > ~/.netrc <<EOF
          machine api.github.com
          login ${{ secrets.SDKS_USER }}
          password ${{ secrets.SDKS_PASSWORD }}
          EOF
          chmod 600 ~/.netrc

          cd Telegram-iOS
          sed -i 's|SDKS_URL|${{ secrets.SDKS_URL }}|g' MODULE.bazel

      - name: Build Telegram
        run: |
          cd Telegram-iOS
          bazel build //Telegram:Telegram

      - uses: actions/upload-artifact@v4
        with:
          name: Telegram.ipa
          path: Telegram-iOS/bazel-bin/Telegram/Telegram.ipa
